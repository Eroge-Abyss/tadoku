on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # This tells it to handle both Rust and Node
          manifest-config: .release-please-manifest.json
          config-file: release-please-config.json
    permissions:
      pull-requests: write
      contents: write
